<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>World Cup V6</title><link rel="stylesheet" href="css/style.css"></head>
<body>
<div class="layout">
<div class="left">
<div class="group">GROUP A</div>
<div class="group">GROUP B</div>
<div class="group">GROUP C</div>
<div class="group">GROUP D</div>
</div>
<div class="center">
<div class="trophy">🏆</div>
<div class="flags">🇺🇸 &nbsp;&nbsp;&nbsp; 🇦🇺</div>
<div class="teams">UNITED STATES <span>VS</span> AUSTRALIA</div>
<div class="countdown">
<div class="box"><span id="days">00</span><small>DAYS</small></div>
<div class="box"><span id="hours">00</span><small>HOURS</small></div>
<div class="box"><span id="minutes">00</span><small>MINS</small></div>
<div class="box"><span id="seconds">00</span><small>SECS</small></div>
</div>
</div>
<div class="right">
<div class="top"><h2>WORLD CUP 2026</h2><div class="ball">⚽</div><div>🦊 🦊 🦊</div></div>
<div class="bottom">
<div class="match">USA vs AUS <b>02:00</b></div>
<div class="match">BRA vs HAI <b>07:30</b></div>
<div class="match">TUR vs PAR <b>11:00</b></div>
</div>
</div>
</div>
<script src="js/app.js"></script>
</body></html>
